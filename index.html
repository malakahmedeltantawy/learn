<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark - Learning App</title>
    <style>
        :root {
            --primary: #ec4899; /* Vibrant Pink */
            --primary-hover: #db2777; /* Darker Pink for hover states */
            --bg: #fdf2f8; /* Soft pastel pink background */
            --card-bg: #ffffff;
            --text: #4c0519; /* Deep rose-tinted text */
            --text-light: #9d174d; /* Medium rose text */
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(236, 72, 153, 0.1);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Setup Screen Styles */
        .setup-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .level-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .level-btn {
            padding: 16px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text);
        }

        .level-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
            transform: translateY(-2px);
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #fce7f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Card Styles */
        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .hidden {
            display: none !important;
        }

        /* Flashcard Specific */
        .flashcard {
            width: 100%;
            cursor: pointer;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flashcard-content {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 20px;
        }

        /* Quiz Specific */
        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
        }

        /* Global Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #fce7f3;
            color: var(--text-light);
        }

        .btn-secondary:hover {
            background: #fbcfe8;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background: #fce7f3;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>EduSpark</h1>
        <p>Master your study topics instantly</p>
    </header>

    <div class="container">
        <div id="setup-screen" class="setup-screen">
            <h2>Welcome! 👋</h2>
            <p style="color: var(--text-light); margin-top: 5px;">Select your current learning level to begin:</p>
            <div class="level-options">
                <button class="level-btn" onclick="startApp('beginner')">🟢 Beginner</button>
                <button class="level-btn" onclick="startApp('intermediate')">🟡 Intermediate</button>
                <button class="level-btn" onclick="startApp('advanced')">🔴 Advanced</button>
            </div>
        </div>

        <div id="main-app" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchMode('flashcards')">Flashcards</button>
                <button class="tab-btn" onclick="switchMode('quiz')">Quiz</button>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="flashcard-view" class="app-card">
                <div class="flashcard" onclick="flipCard()">
                    <div id="card-text" class="flashcard-content">Loading...</div>
                </div>
                <p style="color: var(--text-light); font-size: 0.85rem;">Click card to flip</p>
                <div class="controls">
                    <button class="btn btn-secondary" onclick="prevItem()">Previous</button>
                    <button class="btn btn-primary" onclick="nextItem()">Next Card</button>
                </div>
            </div>

            <div id="quiz-view" class="app-card hidden">
                <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="next-quiz-btn" onclick="nextItem()" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const masterDataset = [
            {
                level: "beginner",
                question: "Which planet is known as the Red Planet?",
                answer: "Mars",
                options: ["Venus", "Jupiter", "Mars", "Saturn"]
            },
            {
                level: "beginner",
                question: "What is the capital city of Japan?",
                answer: "Tokyo",
                options: ["Seoul", "Beijing", "Bangkok", "Tokyo"]
            },
            {
                level: "intermediate",
                question: "What is the primary function of DNA?",
                answer: "To store long-term genetic information.",
                options: ["To store long-term genetic information.", "To generate immediate cellular energy.", "To build cell walls directly.", "To destroy cellular waste."]
            },
            {
                level: "intermediate",
                question: "What is the core meaning of the word 'Impeccable'?",
                answer: "Faultless or flawless",
                options: ["Slightly damaged", "Faultless or flawless", "Extremely loud", "Slow-moving"]
            },
            {
                level: "advanced",
                question: "What is the primary mechanism of action for Enzyme Catalysis?",
                answer: "Lowering the activation energy of a reaction.",
                options: ["Increasing the temperature of the system.", "Lowering the activation energy of a reaction.", "Altering the overall equilibrium constant.", "Consuming the enzyme permanently."]
            },
            {
                level: "advanced",
                question: "Which philosophical school of thought is most closely associated with Jean-Paul Sartre?",
                answer: "Existentialism",
                options: ["Stoicism", "Existentialism", "Logical Positivism", "Nihilism"]
            }
        ];

        let activeDataset = [];
        let currentIndex = 0;
        let isFlipped = false;
        let currentMode = 'flashcards';

        function startApp(selectedLevel) {
            activeDataset = masterDataset.filter(item => item.level === selectedLevel);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            currentIndex = 0;
            isFlipped = false;
            updateFlashcard();
            updateQuiz();
            updateProgressBar();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcards') {
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                isFlipped = false;
                updateFlashcard();
            } else {
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('quiz-view').classList.remove('hidden');
                updateQuiz();
            }
            updateProgressBar();
        }

        function nextItem() {
            if (currentIndex < activeDataset.length - 1) {
                currentIndex++;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            } else {
                alert("🎉 You've reached the end of this level's deck! Resetting to the beginning.");
                currentIndex = 0;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            }
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateFlashcard();
                updateProgressBar();
            }
        }

        function updateFlashcard() {
            if (activeDataset.length === 0) return;
            const cardText = document.getElementById('card-text');
            cardText.innerText = isFlipped ? activeDataset[currentIndex].answer : activeDataset[currentIndex].question;
            cardText.style.color = isFlipped ? 'var(--primary)' : 'var(--text)';
        }

        function flipCard() {
            isFlipped = !isFlipped;
            updateFlashcard();
        }

        function updateQuiz() {
            if (activeDataset.length === 0) return;
            const item = activeDataset[currentIndex];
            document.getElementById('quiz-question').innerText = item.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            document.getElementById('next-quiz-btn').style.display = 'none';

            item.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(button, option, item.answer);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedOption, correctOption) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctOption) {
                    btn.style.background = '#d1fae5';
                    btn.style.borderColor = '#10b981';
                }
            });

            if (selectedOption !== correctOption) {
                selectedButton.style.background = '#fee2e2';
                selectedButton.style.borderColor = '#ef4444';
            }

            document.getElementById('next-quiz-btn').style.display = 'block';
        }

        function updateProgressBar() {
            if (activeDataset.length === 0) return;
            const percentage = ((currentIndex + 1) / activeDataset.length) * 100;
            document.getElementById('progress').style.width = `${percentage}%`;
        }
    </script>
</body>
</html>
