vv<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lrn - Grade Level Learning</title>
    <style>
        :root {
            --primary: #ec4899;
            --primary-hover: #db2777;
            --bg: #fdf2f8;
            --card-bg: #ffffff;
            --text: #4c0519;
            --text-light: #9d174d;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .setup-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 25px;
        }

        @media (max-width: 480px) {
            .grade-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .menu-btn {
            padding: 16px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #fce7f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .passage-box {
            background: #fff1f2;
            border-left: 5px solid var(--primary);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: left;
            color: var(--text);
        }

        .passage-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .hidden {
            display: none !important;
        }

        .flashcard {
            width: 100%;
            cursor: pointer;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .flashcard-content {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 20px;
        }

        .voice-section {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            background: #fff1f2;
            border-radius: 10px;
            border: 1px dashed var(--primary);
        }

        .mic-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
        }

        .mic-btn:hover {
            background: var(--primary-hover);
        }

        .mic-btn.recording {
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .feedback-text {
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #fce7f3;
            color: var(--text-light);
        }

        .progress-container {
            width: 100%;
            background: #fce7f3;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>lrn</h1>
        <p>Curriculum tailored specifically to your grade!</p>
    </header>

    <div class="container">
        <div id="subject-screen" class="setup-screen">
            <h2>Choose a Subject 📚</h2>
            <div class="menu-options">
                <button class="menu-btn" onclick="window.selectSubject('math')">🔢 Math</button>
                <button class="menu-btn" onclick="window.selectSubject('reading')">📖 Reading</button>
                <button class="menu-btn" onclick="window.selectSubject('science')">🔬 Science</button>
            </div>
        </div>

        <div id="level-screen" class="setup-screen hidden">
            <h2>Select Your Grade 🎯</h2>
            <div class="grade-grid">
                <button class="menu-btn" onclick="window.startApp(1)">1st</button>
                <button class="menu-btn" onclick="window.startApp(2)">2nd</button>
                <button class="menu-btn" onclick="window.startApp(3)">3rd</button>
                <button class="menu-btn" onclick="window.startApp(4)">4th</button>
                <button class="menu-btn" onclick="window.startApp(5)">5th</button>
                <button class="menu-btn" onclick="window.startApp(6)">6th</button>
                <button class="menu-btn" onclick="window.startApp(7)">7th</button>
                <button class="menu-btn" onclick="window.startApp(8)">8th</button>
                <button class="menu-btn" onclick="window.startApp(9)">9th</button>
                <button class="menu-btn" onclick="window.startApp(10)">10th</button>
                <button class="menu-btn" onclick="window.startApp(11)">11th</button>
                <button class="menu-btn" onclick="window.startApp(12)">12th</button>
            </div>
        </div>

        <div id="main-app" class="hidden">
            <div class="tabs">
                <button id="tab-flashcards" class="tab-btn active" onclick="window.switchMode('flashcards')">Flashcards</button>
                <button id="tab-quiz" class="tab-btn" onclick="window.switchMode('quiz')">Quiz</button>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="reading-passage" class="passage-box hidden">
                <div class="passage-title">📖 Reading Passage</div>
                <div id="passage-text"></div>
            </div>

            <div id="flashcard-view" class="app-card">
                <div class="flashcard" onclick="window.flipCard()">
                    <div id="card-text" class="flashcard-content">Loading...</div>
                </div>

                <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 10px;">Click card to flip</p>

                <div id="reading-voice-module" class="voice-section hidden">
                    <button id="mic-btn" class="mic-btn" onclick="window.toggleListening()">🎤 Tap & Read Flashcard</button>
                    <div id="feedback" class="feedback-text"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="window.prevItem()">Previous</button>
                    <button class="btn btn-primary" onclick="window.nextItem()">Next Card</button>
                </div>
            </div>

            <div id="quiz-view" class="app-card hidden">
                <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="next-quiz-btn" onclick="window.nextItem()" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>
    </div>
