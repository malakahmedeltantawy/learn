<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark - Learning App</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #e2e8f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Card Styles */
        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        /* Flashcard Specific */
        .flashcard {
            width: 100%;
            cursor: pointer;
            perspective: 1000px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flashcard-content {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 20px;
        }

        /* Quiz Specific */
        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #eef2ff;
        }

        /* Global Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>EduSpark</h1>
        <p>Master your study topics instantly</p>
    </header>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchMode('flashcards')">Flashcards</button>
            <button class="tab-btn" onclick="switchMode('quiz')">Quiz</button>
        </div>

        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>

        <div id="flashcard-view" class="app-card">
            <div class="flashcard" onclick="flipCard()">
                <div id="card-text" class="flashcard-content">Loading...</div>
            </div>
            <p style="color: var(--text-light); font-size: 0.85rem;">Click card to flip</p>
            <div class="controls">
                <button class="btn btn-secondary" onclick="prevItem()">Previous</button>
                <button class="btn btn-primary" onclick="nextItem()">Next Card</button>
            </div>
        </div>

        <div id="quiz-view" class="app-card hidden">
            <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
            <div id="quiz-options" class="quiz-options"></div>
            <div class="controls">
                <button class="btn btn-primary" id="next-quiz-btn" onclick="nextItem()" style="display: none;">Next Question</button>
            </div>
        </div>
    </div>

    <script>
        // Sample Study Dataset
        const dataset = [
            {
                question: "What is the primary function of DNA?",
                answer: "To store long-term genetic information.",
                options: ["To store long-term genetic information.", "To generate immediate cellular energy.", "To build cell walls directly.", "To destroy cellular waste."]
            },
            {
                question: "Which planet is known as the Red Planet?",
                answer: "Mars",
                options: ["Venus", "Jupiter", "Mars", "Saturn"]
            },
            {
                question: "What is the capital city of Japan?",
                answer: "Tokyo",
                options: ["Seoul", "Beijing", "Bangkok", "Tokyo"]
            },
            {
                question: "What is the core meaning of the word 'Impeccable'?",
                answer: "Faultless or flawless",
                options: ["Slightly damaged", "Faultless or flawless", "Extremely loud", "Slow-moving"]
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let currentMode = 'flashcards';

        // Initialize App
        function initApp() {
            updateFlashcard();
            updateQuiz();
            updateProgressBar();
        }

        // Switch between Flashcards and Quiz Modes
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcards') {
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                isFlipped = false;
                updateFlashcard();
            } else {
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('quiz-view').classList.remove('hidden');
                updateQuiz();
            }
            updateProgressBar();
        }

        // Navigation
        function nextItem() {
            if (currentIndex < dataset.length - 1) {
                currentIndex++;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            } else {
                alert("🎉 You've reached the end of the deck! Resetting to the beginning.");
                currentIndex = 0;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            }
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateFlashcard();
                updateProgressBar();
            }
        }

        // Flashcard Logic
        function updateFlashcard() {
            const cardText = document.getElementById('card-text');
            cardText.innerText = isFlipped ? dataset[currentIndex].answer : dataset[currentIndex].question;
            cardText.style.color = isFlipped ? 'var(--primary)' : 'var(--text)';
        }

        function flipCard() {
            isFlipped = !isFlipped;
            updateFlashcard();
        }

        // Quiz Logic
        function updateQuiz() {
            const item = dataset[currentIndex];
            document.getElementById('quiz-question').innerText = item.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            document.getElementById('next-quiz-btn').style.display = 'none';

            item.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(button, option, item.answer);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedOption, correctOption) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true; // Disable all buttons after choice
                if (btn.innerText === correctOption) {
                    btn.style.background = '#d1fae5';
                    btn.style.borderColor = 'var(--success)';
                }
            });

            if (selectedOption !== correctOption) {
                selectedButton.style.background = '#fee2e2';
                selectedButton.style.borderColor = '#ef4444';
            }

            document.getElementById('next-quiz-btn').style.display = 'block';
        }

        // Progress Bar Logic
        function updateProgressBar() {
            const percentage = ((currentIndex + 1) / dataset.length) * 100;
            document.getElementById('progress').style.width = `${percentage}%`;
        }

        // Run on load
        window.onload = initApp;
    </script>
</body>
</html>
