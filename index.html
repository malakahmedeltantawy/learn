<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark - Learning App</title>
    <style>
        :root {
            --primary: #ec4899;
            --primary-hover: #db2777;
            --bg: #fdf2f8;
            --card-bg: #ffffff;
            --text: #4c0519;
            --text-light: #9d174d;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .setup-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .menu-btn {
            padding: 16px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #fce7f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .hidden {
            display: none !important;
        }

        .flashcard {
            width: 100%;
            cursor: pointer;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flashcard-content {
            font-size: 1.5rem;
            font-weight: 600;
            padding: 20px;
        }

        /* Voice Section UI */
        .voice-section {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: #fff1f2;
            border-radius: 10px;
            border: 1px dashed var(--primary);
        }

        .mic-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .mic-btn:hover {
            background: var(--primary-hover);
        }

        .mic-btn.recording {
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .feedback-text {
            font-weight: 600;
            margin-top: 8px;
        }

        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #fce7f3;
            color: var(--text-light);
        }

        .progress-container {
            width: 100%;
            background: #fce7f3;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>EduSpark</h1>
        <p>Master your study topics instantly</p>
    </header>

    <div class="container">
        <div id="subject-screen" class="setup-screen">
            <h2>Choose a Subject 📚</h2>
            <div class="menu-options">
                <button class="menu-btn" onclick="selectSubject('math')">🔢 Math</button>
                <button class="menu-btn" onclick="selectSubject('reading')">📖 Reading</button>
                <button class="menu-btn" onclick="selectSubject('science')">🔬 Science</button>
            </div>
        </div>

        <div id="level-screen" class="setup-screen hidden">
            <h2>Select Your Level 🎯</h2>
            <div class="menu-options">
                <button class="menu-btn" onclick="startApp('beginner')">🟢 Beginner</button>
                <button class="menu-btn" onclick="startApp('intermediate')">🟡 Intermediate</button>
                <button class="menu-btn" onclick="startApp('advanced')">🔴 Advanced</button>
            </div>
        </div>

        <div id="main-app" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchMode('flashcards')">Flashcards</button>
                <button class="tab-btn" onclick="switchMode('quiz')">Quiz</button>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="flashcard-view" class="app-card">
                <div class="flashcard" onclick="flipCard()">
                    <div id="card-text" class="flashcard-content">Loading...</div>
                </div>
                
                <div id="reading-voice-module" class="voice-section hidden">
                    <button id="mic-btn" class="mic-btn" onclick="toggleListening()">🎤 Tap & Say the Sentence</button>
                    <div id="feedback" class="feedback-text"></div>
                </div>

                <p style="color: var(--text-light); font-size: 0.85rem; margin-top: 10px;">Click card to flip</p>
                <div class="controls">
                    <button class="btn btn-secondary" onclick="prevItem()">Previous</button>
                    <button class="btn btn-primary" onclick="nextItem()">Next Card</button>
                </div>
            </div>

            <div id="quiz-view" class="app-card hidden">
                <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="next-quiz-btn" onclick="nextItem()" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Structured Multi-Subject & Multi-Level Dataset
        const masterDataset = {
            math: [
                { level: "beginner", question: "What is 5 + 3?", answer: "8", options: ["6", "7", "8", "9"] },
                { level: "beginner", question: "What is 10 - 4?", answer: "6", options: ["4", "5", "6", "7"] },
                { level: "intermediate", question: "What is 12 x 11?", answer: "132", options: ["122", "132", "142", "152"] },
                { level: "intermediate", question: "What is 144 ÷ 12?", answer: "12", options: ["10", "11", "12", "14"] },
                { level: "advanced", question: "What is the square root of 225?", answer: "15", options: ["13", "14", "15", "25"] }
            ],
            reading: [
                { level: "beginner", question: "The cat sat on the mat.", answer: "The cat sat on the mat.", options: ["The cat sat on the mat.", "A dog ran away.", "The mat was blue.", "The cat was big."] },
                { level: "beginner", question: "The sun is hot.", answer: "The sun is hot.", options: ["The moon is bright.", "The sun is hot.", "It is raining outside.", "The sky is cold."] },
                { level: "intermediate", question: "The brave astronaut explored the distant planet.", answer: "The brave astronaut explored the distant planet.", options: ["The rocket crashed down.", "The brave astronaut explored the distant planet.", "Stars are beautiful tonight.", "A scientist worked late."] },
                { level: "advanced", question: "Environmental preservation requires global cooperation.", answer: "Environmental preservation requires global cooperation.", options: ["Global cooperation is rare.", "Preservation requires local energy.", "Environmental preservation requires global cooperation.", "Governments rule the worlds."] }
            ],
            science: [
                { level: "beginner", question: "What plant part absorbs water from the soil?", answer: "Roots", options: ["Leaves", "Flowers", "Roots", "Stems"] },
                { level: "intermediate", question: "What state of matter has a definite volume but no definite shape?", answer: "Liquid", options: ["Solid", "Liquid", "Gas", "Plasma"] },
                { level: "advanced", question: "What is the speed of light approximately?", answer: "300,000 km/s", options: ["150,000 km/s", "300,000 km/s", "1,000,000 km/s", "500,000 km/s"] }
            ]
        };

        let chosenSubject = '';
        let chosenLevel = '';
        let activeDataset = [];
        let currentIndex = 0;
        let isFlipped = false;
        let currentMode = 'flashcards';
        
        // Speech API tools
        let recognition;
        let isListening = false;

        function selectSubject(subject) {
            chosenSubject = subject;
            document.getElementById('subject-screen').classList.add('hidden');
            document.getElementById('level-screen').classList.remove('hidden');
        }

        function startApp(level) {
            chosenLevel = level;
            activeDataset = masterDataset[chosenSubject].filter(item => item.level === chosenLevel);

            if (activeDataset.length === 0) {
                alert("No items found for this configuration! Resetting.");
                location.reload();
                return;
            }

            document.getElementById('level-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            currentIndex = 0;
            isFlipped = false;
            updateFlashcard();
            updateQuiz();
            updateProgressBar();
            setupSpeechRecognition();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcards') {
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                isFlipped = false;
                updateFlashcard();
            } else {
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('quiz-view').classList.remove('hidden');
                updateQuiz();
            }
            updateProgressBar();
        }

        function nextItem() {
            if (currentIndex < activeDataset.length - 1) {
                currentIndex++;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            } else {
                alert("🎉 Core deck completed! Returning to Main Menu.");
                location.reload();
            }
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateFlashcard();
                updateProgressBar();
            }
        }

        function updateFlashcard() {
            if (activeDataset.length === 0) return;
            const cardText = document.getElementById('card-text');
            const voiceModule = document.getElementById('reading-voice-module');
            
            cardText.innerText = isFlipped ? activeDataset[currentIndex].answer : activeDataset[currentIndex].question;
            cardText.style.color = isFlipped ? 'var(--primary)' : 'var(--text)';
            document.getElementById('feedback').innerText = '';

            // Only show mic options if user picks reading and the card shows the question/target sentence
            if (chosenSubject === 'reading' && !isFlipped) {
                voiceModule.classList.remove('hidden');
            } else {
                voiceModule.classList.add('hidden');
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            updateFlashcard();
        }

        // --- SPEECH RECOGNITION & SPEAK BACK LOGIC ---
        function setupSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'en-US';
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const spokenText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                    const targetText = activeDataset[currentIndex].question.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                    
                    const feedbackDiv = document.getElementById('feedback');
                    
                    if (spokenText.trim() === targetText.trim()) {
                        feedbackDiv.innerText = "✨ Perfect! You read it correctly!";
                        feedbackDiv.style.color = "var(--success)";
                    } else {
                        feedbackDiv.innerText = `❌ Not quite! You said "${event.results[0][0].transcript}". Let me help you out.`;
                        feedbackDiv.style.color = "var(--error)";
                        // Read out the proper pronunciation automatically
                        speakCorrectWay(activeDataset[currentIndex].question);
                    }
                    stopListeningMode();
                };

                recognition.onerror = function() {
                    stopListeningMode();
                };

                recognition.onend = function() {
                    stopListeningMode();
                };
            }
        }

        function toggleListening() {
            if (!recognition) {
                alert("Speech recognition isn't supported on this browser. Try Chrome or Safari.");
                return;
            }
            if (isListening) {
                recognition.stop();
                stopListeningMode();
            } else {
                isListening = true;
                const btn = document.getElementById('mic-btn');
                btn.innerText = "🎙️ Listening... Speak Now";
                btn.classList.add('recording');
                recognition.start();
            }
        }

        function stopListeningMode() {
            isListening = false;
            const btn = document.getElementById('mic-btn');
            if(btn) {
                btn.innerText = "🎤 Tap & Say the Sentence";
                btn.classList.remove('recording');
            }
        }

        function speakCorrectWay(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Spoken slightly slower to facilitate clear pronunciation
                window.speechSynthesis.speak(utterance);
            }
        }

        // Quiz Logic
        function updateQuiz() {
            if (activeDataset.length === 0) return;
            const item = activeDataset[currentIndex];
            document.getElementById('quiz-question').innerText = item.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            document.getElementById('next-quiz-btn').style.display = 'none';

            item.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(button, option, item.answer);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedOption, correctOption) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctOption) {
                    btn.style.background = '#d1fae5';
                    btn.style.borderColor = '#10b981';
                }
            });

            if (selectedOption !== correctOption) {
                selectedButton.style.background = '#fee2e2';
                selectedButton.style.borderColor = '#ef4444';
            }

            document.getElementById('next-quiz-btn').style.display = 'block';
        }

        function updateProgressBar() {
            if (activeDataset.length === 0) return;
            const percentage = ((currentIndex + 1) / activeDataset.length) * 100;
            document.getElementById('progress').style.width = `${percentage}%`;
        }
    </script>
</body>
</html>
