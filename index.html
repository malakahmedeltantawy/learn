<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark - Grade Level Learning</title>
    <style>
        :root {
            --primary: #ec4899;
            --primary-hover: #db2777;
            --bg: #fdf2f8;
            --card-bg: #ffffff;
            --text: #4c0519;
            --text-light: #9d174d;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .setup-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 25px;
        }

        @media (max-width: 480px) {
            .grade-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .menu-btn {
            padding: 16px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #fce7f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .passage-box {
            background: #fff1f2;
            border-left: 5px solid var(--primary);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: left;
            color: var(--text);
        }

        .passage-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .hidden {
            display: none !important;
        }

        .flashcard {
            width: 100%;
            cursor: pointer;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .flashcard-content {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 20px;
        }

        .voice-section {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            background: #fff1f2;
            border-radius: 10px;
            border: 1px dashed var(--primary);
        }

        .mic-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
        }

        .mic-btn:hover {
            background: var(--primary-hover);
        }

        .mic-btn.recording {
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .feedback-text {
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #fce7f3;
            color: var(--text-light);
        }

        .progress-container {
            width: 100%;
            background: #fce7f3;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1>EduSpark</h1>
        <p>Curriculum tailored specifically to your grade!</p>
    </header>

    <div class="container">
        <div id="subject-screen" class="setup-screen">
            <h2>Choose a Subject 📚</h2>
            <div class="menu-options">
                <button class="menu-btn" onclick="window.selectSubject('math')">🔢 Math</button>
                <button class="menu-btn" onclick="window.selectSubject('reading')">📖 Reading</button>
                <button class="menu-btn" onclick="window.selectSubject('science')">🔬 Science</button>
            </div>
        </div>

        <div id="level-screen" class="setup-screen hidden">
            <h2>Select Your Grade 🎯</h2>
            <div class="grade-grid">
                <button class="menu-btn" onclick="window.startApp(1)">1st</button>
                <button class="menu-btn" onclick="window.startApp(2)">2nd</button>
                <button class="menu-btn" onclick="window.startApp(3)">3rd</button>
                <button class="menu-btn" onclick="window.startApp(4)">4th</button>
                <button class="menu-btn" onclick="window.startApp(5)">5th</button>
                <button class="menu-btn" onclick="window.startApp(6)">6th</button>
                <button class="menu-btn" onclick="window.startApp(7)">7th</button>
                <button class="menu-btn" onclick="window.startApp(8)">8th</button>
                <button class="menu-btn" onclick="window.startApp(9)">9th</button>
                <button class="menu-btn" onclick="window.startApp(10)">10th</button>
                <button class="menu-btn" onclick="window.startApp(11)">11th</button>
                <button class="menu-btn" onclick="window.startApp(12)">12th</button>
            </div>
        </div>

        <div id="main-app" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="window.switchMode('flashcards')">Flashcards</button>
                <button class="tab-btn" onclick="window.switchMode('quiz')">Quiz</button>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="reading-passage" class="passage-box hidden">
                <div class="passage-title">📖 Reading Passage</div>
                <div id="passage-text"></div>
            </div>

            <div id="flashcard-view" class="app-card">
                <div class="flashcard" onclick="window.flipCard()">
                    <div id="card-text" class="flashcard-content">Loading...</div>
                </div>

                <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 10px;">Click card to flip</p>

                <div id="reading-voice-module" class="voice-section hidden">
                    <button id="mic-btn" class="mic-btn" onclick="window.toggleListening()">🎤 Tap & Read Flashcard</button>
                    <div id="feedback" class="feedback-text"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="window.prevItem()">Previous</button>
                    <button class="btn btn-primary" onclick="window.nextItem()">Next Card</button>
                </div>
            </div>

            <div id="quiz-view" class="app-card hidden">
                <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="next-quiz-btn" onclick="window.nextItem()" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Massive Custom Database for EVERY Grade Level!
        const curriculumDatabase = {
            math: {
                1: [
                    { question: "What is 2 + 3?", correct_answer: "5", incorrect_answers: ["4", "6", "3"] },
                    { question: "What is 5 - 1?", correct_answer: "4", incorrect_answers: ["3", "5", "2"] }
                ],
                2: [
                    { question: "What is 12 + 8?", correct_answer: "20", incorrect_answers: ["18", "22", "19"] },
                    { question: "What is 15 - 7?", correct_answer: "8", incorrect_answers: ["7", "9", "6"] }
                ],
                3: [
                    { question: "What is 4 x 3?", correct_answer: "12", incorrect_answers: ["7", "16", "14"] },
                    { question: "What is 20 ÷ 5?", correct_answer: "4", incorrect_answers: ["5", "3", "6"] }
                ],
                4: [
                    { question: "What is 8 x 7?", correct_answer: "56", incorrect_answers: ["54", "64", "48"] },
                    { question: "What is 1/2 of 20?", correct_answer: "10", incorrect_answers: ["5", "15", "12"] }
                ],
                5: [
                    { question: "What is 1.5 + 2.5?", correct_answer: "4.0", incorrect_answers: ["3.5", "4.5", "3.0"] },
                    { question: "What is the perimeter of a 4x4 square?", correct_answer: "16", incorrect_answers: ["8", "12", "20"] }
                ],
                6: [
                    { question: "What is 20% of 50?", correct_answer: "10", incorrect_answers: ["5", "15", "20"] },
                    { question: "Simplify the ratio 4:8", correct_answer: "1:2", incorrect_answers: ["2:4", "1:3", "1:4"] }
                ],
                7: [
                    { question: "If x - 5 = 10, what is x?", correct_answer: "15", incorrect_answers: ["5", "10", "20"] },
                    { question: "What is the area of a circle with radius 3? (Use π ≈ 3.14)", correct_answer: "28.26", incorrect_answers: ["9.42", "18.84", "12.56"] }
                ],
                8: [
                    { question: "Solve for y: 2y + 4 = 12", correct_answer: "4", incorrect_answers: ["3", "5", "6"] },
                    { question: "What is 3 squared (3²)?", correct_answer: "9", incorrect_answers: ["6", "12", "27"] }
                ],
                9: [
                    { question: "What is the slope of the line y = 3x + 2?", correct_answer: "3", incorrect_answers: ["2", "x", "-3"] },
                    { question: "Find the hypotenuse of a right triangle with sides 3 and 4.", correct_answer: "5", incorrect_answers: ["6", "7", "25"] }
                ],
                10: [
                    { question: "What are the roots of x² - 4 = 0?", correct_answer: "2 and -2", incorrect_answers: ["2 only", "4 and -4", "0 and 4"] },
                    { question: "In a right triangle, what is Sine?", correct_answer: "Opposite / Hypotenuse", incorrect_answers: ["Adjacent / Hypotenuse", "Opposite / Adjacent", "Hypotenuse / Opposite"] }
                ],
                11: [
                    { question: "What is the value of log₁₀(100)?", correct_answer: "2", incorrect_answers: ["10", "1", "100"] },
                    { question: "What is the formula for the quadratic equation?", correct_answer: "-b ± √(b² - 4ac) / 2a", incorrect_answers: ["a² + b² = c²", "y = mx + b", "A = πr²"] }
                ],
                12: [
                    { question: "What is the derivative of x²?", correct_answer: "2x", incorrect_answers: ["x", "2", "x²"] },
                    { question: "What is the integral of 2x dx?", correct_answer: "x² + C", incorrect_answers: ["2x² + C", "x + C", "2 + C"] }
                ]
            },
            science: {
                1: [
                    { question: "Which body part do you use to see?", correct_answer: "Eyes", incorrect_answers: ["Ears", "Nose", "Mouth"] }
                ],
                2: [
                    { question: "What do plants need to grow?", correct_answer: "Water and sunlight", incorrect_answers: ["Milk and bread", "Soda and ice", "Rocks and sand"] }
                ],
                3: [
                    { question: "What planet do we live on?", correct_answer: "Earth", incorrect_answers: ["Mars", "Venus", "Jupiter"] }
                ],
                4: [
                    { question: "Which is a liquid?", correct_answer: "Water", incorrect_answers: ["Ice", "Steam", "Wood"] }
                ],
                5: [
                    { question: "What is the center of our solar system?", correct_answer: "The Sun", incorrect_answers: ["Earth", "The Moon", "Jupiter"] }
                ],
                6: [
                    { question: "What gas do plants breathe in?", correct_answer: "Carbon Dioxide", incorrect_answers: ["Oxygen", "Nitrogen", "Helium"] }
                ],
                7: [
                    { question: "What is the powerhouse of the cell?", correct_answer: "Mitochondria", incorrect_answers: ["Nucleus", "Ribosome", "Membrane"] }
                ],
                8: [
                    { question: "What is the chemical symbol for water?", correct_answer: "H2O", incorrect_answers: ["O2", "CO2", "HO"] }
                ],
                9: [
                    { question: "What force pulls objects toward the Earth?", correct_answer: "Gravity", incorrect_answers: ["Magnetism", "Friction", "Inertia"] }
                ],
                10: [
                    { question: "What carries genetic information in living things?", correct_answer: "DNA", incorrect_answers: ["RNA", "Proteins", "Lipids"] }
                ],
                11: [
                    { question: "What is the atomic number of Hydrogen?", correct_answer: "1", incorrect_answers: ["2", "10", "14"] }
                ],
                12: [
                    { question: "What is the speed of light in a vacuum?", correct_answer: "300,000 km/s", incorrect_answers: ["150,000 km/s", "1,000 km/s", "3,000,000 km/s"] }
                ]
            },
            reading: {
                1: {
                    passage: "The cat is orange. The cat sits on the mat. The mat is blue. The cat likes to sleep.",
                    questions: [{ question: "What color is the cat?", correct_answer: "Orange", incorrect_answers: ["Blue", "Black", "White"] }]
                },
                2: {
                    passage: "Tim has a red bicycle. He rides it to the park every day. His friend Sarah has a blue scooter. They like to race each other.",
                    questions: [{ question: "What does Tim ride to the park?", correct_answer: "A red bicycle", incorrect_answers: ["A blue scooter", "A skateboard", "A car"] }]
                },
                3: {
                    passage: "Bees are very important insects. They fly from flower to flower to collect nectar. They use the nectar to make sweet honey inside their hive.",
                    questions: [{ question: "What do bees collect from flowers?", correct_answer: "Nectar", incorrect_answers: ["Honey", "Water", "Leaves"] }]
                },
                4: {
                    passage: "The solar system has eight planets. The closest planet to the sun is Mercury, but the hottest planet is Venus. Earth is the third planet from the sun.",
                    questions: [{ question: "Which planet is the hottest?", correct_answer: "Venus", incorrect_answers: ["Mercury", "Earth", "Mars"] }]
                },
                5: {
                    passage: "Thomas Edison was a famous inventor. While he did not invent the first lightbulb, he created the first practical and long-lasting electric lightbulb in 1879.",
                    questions: [{ question: "What did Thomas Edison create in 1879?", correct_answer: "A practical, long-lasting lightbulb", incorrect_answers: ["The very first lightbulb", "The telephone", "The battery"] }]
                },
                6: {
                    passage: "Photosynthesis is the process plants use to make food. They take in sunlight, water, and carbon dioxide, and turn them into glucose and oxygen.",
                    questions: [{ question: "What do plants release during photosynthesis?", correct_answer: "Oxygen", incorrect_answers: ["Carbon Dioxide", "Sunlight", "Water"] }]
                },
                7: {
                    passage: "Ancient Egypt was located along the Nile River. The river flooded every year, providing rich soil for farming. The Egyptians built massive pyramids as tombs for their pharaohs.",
                    questions: [{ question: "Why was the Nile River important to ancient Egyptians?", correct_answer: "It provided rich soil for farming", incorrect_answers: ["It was used to build pyramids", "It stopped invaders", "It provided drinking water only"] }]
                },
                8: {
                    passage: "The Industrial Revolution marked a major turning point in history. It transitioned societies from manual labor and farming to machine-based manufacturing, starting in Great Britain in the 18th century.",
                    questions: [{ question: "Where did the Industrial Revolution begin?", correct_answer: "Great Britain", incorrect_answers: ["United States", "France", "Germany"] }]
                },
                9: {
                    passage: "In literature, the theme is the underlying message or central idea that the author wants to convey. It is different from the plot, which is simply the sequence of events that make up the story.",
                    questions: [{ question: "How does a theme differ from a plot?", correct_answer: "The theme is the message; the plot is the events", incorrect_answers: ["The plot is the message; the theme is the characters", "They are exactly the same thing", "The theme is the setting of the story"] }]
                },
                10: {
                    passage: "An ecosystem consists of all the living organisms in a given area interacting with their physical environment. These systems maintain balance through energy flows and nutrient cycles.",
                    questions: [{ question: "What maintains the balance within an ecosystem?", correct_answer: "Energy flows and nutrient cycles", incorrect_answers: ["Only the living organisms", "Only the physical environment", "Human intervention"] }]
                },
                11: {
                    passage: "The United States Constitution establishes the framework of the federal government. It divides power into three branches: the Legislative makes laws, the Executive enforces laws, and the Judicial interprets laws.",
                    questions: [{ question: "Which branch of government is responsible for enforcing laws?", correct_answer: "Executive", incorrect_answers: ["Legislative", "Judicial", "Constitutional"] }]
                },
                12: {
                    passage: "Quantum mechanics is a fundamental theory in physics that describes nature at the smallest scales of energy levels of atoms and subatomic particles. Unlike classical physics, it dictates that energy, momentum, and other quantities are restricted to discrete values.",
                    questions: [{ question: "What is a key difference between classical physics and quantum mechanics?", correct_answer: "Quantum mechanics restricts energy to discrete values", incorrect_answers: ["Classical physics only applies to atoms", "Quantum mechanics deals with massive planets", "Classical physics is newer"] }]
                }
            }
        };

        let chosenSubject = '';
        let activeDataset = [];
        let currentIndex = 0;
        let isFlipped = false;
        let currentMode = 'flashcards';
        let recognition;
        let isListening = false;

        // BIND FUNCTIONS TO WINDOW
        window.selectSubject = function(subject) {
            chosenSubject = subject;
            document.getElementById('subject-screen').classList.add('hidden');
            document.getElementById('level-screen').classList.remove('hidden');
        };

        window.startApp = function(grade) {
            document.getElementById('level-screen').classList.add('hidden');
            
            // Build the lesson dynamically from the internal database
            if (chosenSubject === 'reading') {
                const lessonData = curriculumDatabase.reading[grade];
                document.getElementById('passage-text').innerText = lessonData.passage;
                document.getElementById('reading-passage').classList.remove('hidden');
                
                activeDataset = lessonData.questions.map(item => {
                    const choices = [...item.incorrect_answers];
                    choices.push(item.correct_answer);
                    choices.sort(() => Math.random() - 0.5); // Shuffle
                    return { question: item.question, answer: item.correct_answer, options: choices };
                });
            } else {
                document.getElementById('reading-passage').classList.add('hidden');
                const rawQuestions = curriculumDatabase[chosenSubject][grade];
                
                activeDataset = rawQuestions.map(item => {
                    const choices = [...item.incorrect_answers];
                    choices.push(item.correct_answer);
                    choices.sort(() => Math.random() - 0.5); // Shuffle
                    return { question: item.question, answer: item.correct_answer, options: choices };
                });
            }

            document.getElementById('main-app').classList.remove('hidden');
            currentIndex = 0;
            isFlipped = false;
            setupSpeechRecognition(); 
            updateFlashcard();
            updateQuiz();
            updateProgressBar();
        };

        window.switchMode = function(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcards') {
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                isFlipped = false;
                updateFlashcard();
            } else {
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('quiz-view').classList.remove('hidden');
                updateQuiz();
            }
            updateProgressBar();
        };

        window.nextItem = function() {
            if (currentIndex < activeDataset.length - 1) {
                currentIndex++;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            } else {
                alert("🎉 Lesson completed! Heading back to the main menu.");
                location.reload();
            }
        };

        window.prevItem = function() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateFlashcard();
                updateProgressBar();
            }
        };

        function updateFlashcard() {
            if (activeDataset.length === 0) return;
            const cardText = document.getElementById('card-text');
            const voiceModule = document.getElementById('reading-voice-module');
            
            cardText.innerText = isFlipped ? activeDataset[currentIndex].answer : activeDataset[currentIndex].question;
            cardText.style.color = isFlipped ? 'var(--primary)' : 'var(--text)';
            
            document.getElementById('feedback').innerText = '';

            if (chosenSubject === 'reading') {
                voiceModule.classList.remove('hidden');
            } else {
                voiceModule.classList.add('hidden');
            }
        }

        window.flipCard = function() {
            isFlipped = !isFlipped;
            updateFlashcard();
        };

        function setupSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'en-US';
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const spokenText = event.results[0][0].transcript.toLowerCase().replace(/[^\w\s]/gi, '');
                    const currentCardText = document.getElementById('card-text').innerText.toLowerCase().replace(/[^\w\s]/gi, '');
                    
                    const feedbackDiv = document.getElementById('feedback');
                    
                    if (spokenText.trim() === currentCardText.trim()) {
                        feedbackDiv.innerText = "✨ Perfect! You read it exactly right!";
                        feedbackDiv.style.color = "var(--success)";
                    } else {
                        feedbackDiv.innerText = `❌ Not quite! You said: "${event.results[0][0].transcript}". Let me help you out.`;
                        feedbackDiv.style.color = "var(--error)";
                        speakCorrectWay(document.getElementById('card-text').innerText);
                    }
                    stopListeningMode();
                };

                recognition.onerror = function() { stopListeningMode(); };
                recognition.onend = function() { stopListeningMode(); };
            }
        }

        window.toggleListening = function() {
            if (!recognition) {
                alert("Speech recognition isn't supported on this browser. Try opening the app in Google Chrome or Safari!");
                return;
            }
            if (isListening) {
                recognition.stop();
                stopListeningMode();
            } else {
                isListening = true;
                const btn = document.getElementById('mic-btn');
                btn.innerText = "🎙️ Listening... Read the flashcard aloud!";
                btn.classList.add('recording');
                recognition.start();
            }
        };

        function stopListeningMode() {
            isListening = false;
            const btn = document.getElementById('mic-btn');
            if(btn) {
                btn.innerText = "🎤 Tap & Read Flashcard";
                btn.classList.remove('recording');
            }
        }

        function speakCorrectWay(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function updateQuiz() {
            if (activeDataset.length === 0) return;
            const item = activeDataset[currentIndex];
            document.getElementById('quiz-question').innerText = item.question;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            document.getElementById('next-quiz-btn').style.display = 'none';

            item.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => window.checkAnswer(button, option, item.answer);
                optionsContainer.appendChild(button);
            });
        }

        window.checkAnswer = function(selectedButton, selectedOption, correctOption) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText === correctOption) {
                    btn.style.background = '#d1fae5';
                    btn.style.borderColor = '#10b981';
                }
            });

            if (selectedOption !== correctOption) {
                selectedButton.style.background = '#fee2e2';
                selectedButton.style.borderColor = '#ef4444';
            }

            document.getElementById('next-quiz-btn').style.display = 'block';
        };

        function updateProgressBar() {
            if (activeDataset.length === 0) return;
            const percentage = ((currentIndex + 1) / activeDataset.length) * 100;
            document.getElementById('progress').style.width = `${percentage}%`;
        }
    </script>
</body>
</html>
