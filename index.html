<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSpark - Live Learning App</title>
    <style>
        :root {
            --primary: #ec4899;
            --primary-hover: #db2777;
            --bg: #fdf2f8;
            --card-bg: #ffffff;
            --text: #4c0519;
            --text-light: #9d174d;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .setup-screen {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 25px;
        }

        @media (max-width: 480px) {
            .grade-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .menu-btn {
            padding: 16px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--text);
        }

        .menu-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
            transform: translateY(-2px);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #fce7f3;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Reading Passage Box */
        .passage-box {
            background: #fff1f2;
            border-left: 5px solid var(--primary);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            font-size: 1.1rem;
            line-height: 1.7;
            text-align: left;
            color: var(--text);
        }

        .passage-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px -3px rgba(236, 72, 153, 0.1);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #fbcfe8;
        }

        .hidden {
            display: none !important;
        }

        .flashcard {
            width: 100%;
            cursor: pointer;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .flashcard-content {
            font-size: 1.4rem;
            font-weight: 600;
            padding: 20px;
        }

        /* Voice Section restored */
        .voice-section {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            background: #fff1f2;
            border-radius: 10px;
            border: 1px dashed var(--primary);
        }

        .mic-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            width: 100%;
        }

        .mic-btn:hover {
            background: var(--primary-hover);
        }

        .mic-btn.recording {
            background: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .feedback-text {
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .quiz-options {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            width: 100%;
            padding: 14px;
            background: #fff1f2;
            border: 2px solid #fce7f3;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #fce7f3;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #fce7f3;
            color: var(--text-light);
        }

        .progress-container {
            width: 100%;
            background: #fce7f3;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <h1>EduSpark Live</h1>
        <p>Fresh online study questions every single run</p>
    </header>

    <div class="container">
        <div id="subject-screen" class="setup-screen">
            <h2>Choose a Subject 📚</h2>
            <div class="menu-options">
                <button class="menu-btn" onclick="selectSubject('math')">🔢 Math</button>
                <button class="menu-btn" onclick="selectSubject('reading')">📖 Reading</button>
                <button class="menu-btn" onclick="selectSubject('science')">🔬 Science</button>
            </div>
        </div>

        <div id="level-screen" class="setup-screen hidden">
            <h2>Select Your Grade 🎯</h2>
            <div class="grade-grid">
                <button class="menu-btn" onclick="startApp(1)">1st</button>
                <button class="menu-btn" onclick="startApp(2)">2nd</button>
                <button class="menu-btn" onclick="startApp(3)">3rd</button>
                <button class="menu-btn" onclick="startApp(4)">4th</button>
                <button class="menu-btn" onclick="startApp(5)">5th</button>
                <button class="menu-btn" onclick="startApp(6)">6th</button>
                <button class="menu-btn" onclick="startApp(7)">7th</button>
                <button class="menu-btn" onclick="startApp(8)">8th</button>
                <button class="menu-btn" onclick="startApp(9)">9th</button>
                <button class="menu-btn" onclick="startApp(10)">10th</button>
                <button class="menu-btn" onclick="startApp(11)">11th</button>
                <button class="menu-btn" onclick="startApp(12)">12th</button>
            </div>
        </div>

        <div id="loading-screen" class="setup-screen hidden">
            <p class="loading-text">📡 Setting up your lesson...</p>
        </div>

        <div id="main-app" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchMode('flashcards')">Flashcards</button>
                <button class="tab-btn" onclick="switchMode('quiz')">Quiz</button>
            </div>

            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="reading-passage" class="passage-box hidden">
                <div class="passage-title">📖 Reading Passage</div>
                <div id="passage-text"></div>
            </div>

            <div id="flashcard-view" class="app-card">
                <div class="flashcard" onclick="flipCard()">
                    <div id="card-text" class="flashcard-content">Loading...</div>
                </div>

                <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 10px;">Click card to flip</p>

                <div id="reading-voice-module" class="voice-section hidden">
                    <button id="mic-btn" class="mic-btn" onclick="toggleListening()">🎤 Tap & Read Flashcard</button>
                    <div id="feedback" class="feedback-text"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="prevItem()">Previous</button>
                    <button class="btn btn-primary" onclick="nextItem()">Next Card</button>
                </div>
            </div>

            <div id="quiz-view" class="app-card hidden">
                <h3 id="quiz-question" style="font-size: 1.3rem; margin-bottom: 15px;">Loading Question...</h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div class="controls">
                    <button class="btn btn-primary" id="next-quiz-btn" onclick="nextItem()" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration Mapping
        const categories = {
            math: 19,     
            science: 17   
        };

        // Custom Reading Comprehension Database
        const readingDatabase = {
            easy: [
                {
                    passage: "Sam has a small dog named Pip. Pip is brown with big white spots. Every morning, Sam and Pip walk to the park. Pip loves to chase red balls and run in the tall green grass.",
                    questions: [
                        { question: "What color is Pip?", correct_answer: "Brown with white spots", incorrect_answers: ["All black", "Golden yellow", "White with black spots"] },
                        { question: "Where do Sam and Pip go in the morning?", correct_answer: "The park", incorrect_answers: ["The beach", "The store", "The school"] },
                        { question: "What does Pip love to chase?", correct_answer: "Red balls", incorrect_answers: ["Cats", "Cars", "Blue frisbees"] }
                    ]
                }
            ],
            medium: [
                {
                    passage: "The water cycle describes how water moves around the Earth. The sun heats up water in oceans and lakes, turning it into vapor. This is called evaporation. As the vapor rises, it cools and forms clouds, which is called condensation. Finally, the water falls back to Earth as rain or snow, known as precipitation.",
                    questions: [
                        { question: "What causes water to evaporate?", correct_answer: "Heat from the sun", incorrect_answers: ["Wind", "Cold air", "Ocean currents"] },
                        { question: "What is it called when water vapor cools to form clouds?", correct_answer: "Condensation", incorrect_answers: ["Precipitation", "Evaporation", "Collection"] },
                        { question: "Which of the following is an example of precipitation?", correct_answer: "Rain", incorrect_answers: ["A cloud", "Water vapor", "Sunlight"] }
                    ]
                }
            ],
            hard: [
                {
                    passage: "Photosynthesis is the fundamental biological process by which plants, algae, and some bacteria convert light energy into chemical energy. During this process, carbon dioxide and water are transformed into glucose and oxygen, utilizing sunlight absorbed by chlorophyll.",
                    questions: [
                        { question: "What is the primary purpose of photosynthesis for the plant?", correct_answer: "To convert light energy into chemical energy", incorrect_answers: ["To release carbon dioxide", "To absorb oxygen from the air", "To create water"] },
                        { question: "Which molecule absorbs the sunlight during photosynthesis?", correct_answer: "Chlorophyll", incorrect_answers: ["Glucose", "Oxygen", "Carbon dioxide"] },
                        { question: "What are the two main byproducts produced by this process?", correct_answer: "Glucose and oxygen", incorrect_answers: ["Water and carbon dioxide", "Chlorophyll and light", "Heat and water vapor"] }
                    ]
                }
            ]
        };

        let chosenSubject = '';
        let chosenDifficulty = '';
        let activeDataset = [];
        let currentIndex = 0;
        let isFlipped = false;
        let currentMode = 'flashcards';

        // Variables for Speech Recognition
        let recognition;
        let isListening = false;

        function selectSubject(subject) {
            chosenSubject = subject;
            document.getElementById('subject-screen').classList.add('hidden');
            document.getElementById('level-screen').classList.remove('hidden');
        }

        async function startApp(grade) {
            if (grade <= 5) {
                chosenDifficulty = 'easy';
            } else if (grade <= 8) {
                chosenDifficulty = 'medium';
            } else {
                chosenDifficulty = 'hard';
            }

            document.getElementById('level-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            if (chosenSubject === 'reading') {
                setupReadingLesson();
            } else {
                await fetchLiveTrivia();
            }
        }

        function setupReadingLesson() {
            const passages = readingDatabase[chosenDifficulty];
            const selectedLesson = passages[Math.floor(Math.random() * passages.length)];
            
            document.getElementById('passage-text').innerText = selectedLesson.passage;
            document.getElementById('reading-passage').classList.remove('hidden');

            activeDataset = selectedLesson.questions.map(item => {
                const choices = [...item.incorrect_answers];
                choices.push(item.correct_answer);
                choices.sort(() => Math.random() - 0.5);

                return {
                    question: item.question,
                    answer: item.correct_answer,
                    options: choices
                };
            });

            launchMainApp();
        }

        async function fetchLiveTrivia() {
            document.getElementById('reading-passage').classList.add('hidden');

            const categoryId = categories[chosenSubject];
            const apiUrl = `https://opentdb.com/api.php?amount=5&category=${categoryId}&difficulty=${chosenDifficulty}&type=multiple`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.response_code === 0 && data.results.length > 0) {
                    activeDataset = data.results.map(item => {
                        const cleanQuestion = decodeHTML(item.question);
                        const cleanAnswer = decodeHTML(item.correct_answer);
                        
                        const choices = item.incorrect_answers.map(ans => decodeHTML(ans));
                        choices.push(cleanAnswer);
                        choices.sort(() => Math.random() - 0.5);

                        return {
                            question: cleanQuestion,
                            answer: cleanAnswer,
                            options: choices
                        };
                    });

                    launchMainApp();
                } else {
                    throw new Error("No trivia records found.");
                }
            } catch (error) {
                alert("⚠️ Trouble connecting to the online live question network. Let's try again!");
                location.reload();
            }
        }

        function launchMainApp() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            currentIndex = 0;
            isFlipped = false;
            setupSpeechRecognition(); // Initialize the microphone tools
            updateFlashcard();
            updateQuiz();
            updateProgressBar();
        }

        function decodeHTML(html) {
            const txt = document.createElement("textarea");
            txt.innerHTML = html;
            return txt.value;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (mode === 'flashcards') {
                document.getElementById('flashcard-view').classList.remove('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                isFlipped = false;
                updateFlashcard();
            } else {
                document.getElementById('flashcard-view').classList.add('hidden');
                document.getElementById('quiz-view').classList.remove('hidden');
                updateQuiz();
            }
            updateProgressBar();
        }

        function nextItem() {
            if (currentIndex < activeDataset.length - 1) {
                currentIndex++;
                isFlipped = false;
                currentMode === 'flashcards' ? updateFlashcard() : updateQuiz();
                updateProgressBar();
            } else {
                alert("🎉 Lesson completed! Heading back to the main menu.");
                location.reload();
            }
        }

        function prevItem() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateFlashcard();
                updateProgressBar();
            }
        }

        function updateFlashcard() {
            if (activeDataset.length === 0) return;
            const cardText = document.getElementById('card-text');
            const voiceModule = document.getElementById('reading-voice-module');
            
            cardText.innerText = isFlipped ? activeDataset[currentIndex].answer : activeDataset[currentIndex].question;
            cardText.style.color = isFlipped ? 'var(--primary)' : 'var(--text)';
            
            // Clear out any old feedback text when you flip or change cards
            document.getElementById('feedback').innerText = '';

            // Make sure the microphone button only shows up during Reading
            if (chosenSubject === 'reading') {
                voiceModule.classList.remove('hidden');
            } else {
                voiceModule.classList.add('hidden');
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            updateFlashcard();
        }

        // --- SPEECH RECOGNITION SYSTEM RESTORED ---
        function setupSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.lang = 'en-US';
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const spokenText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"]/g,"");
                    
                    // Match against whatever text is CURRENTLY showing on the flashcard!
                    const currentCardText = document.getElementById('card-text').innerText.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"]/g,"");
                    
                    const feedbackDiv = document.getElementById('feedback');
                    
                    // Check if they matched it perfectly
                    if (spokenText.trim() === currentCardText.trim()) {
                        feedbackDiv.innerText = "✨ Perfect! You read it exactly right!";
                        feedbackDiv.style.color = "var(--success)";
                    } else {
                        feedbackDiv.innerText = `❌ Not quite! You said: "${event.results[0][0].transcript}". Let me help you out.`;
                        feedbackDiv.style.color = "var(--error)";
                        // Use AI voice to read it correctly to them
                        speakCorrectWay(document.getElementById('card
